<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
            width: 500px;
            height: 300px;
        }

        th {
            background-color: gray;
            color: white;
            border: 1px solid black;
        }

        td {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th rowspan="2" scope="col">Área</th>
                <th rowspan="2" scope="col">Disciplina</th>
                <th colspan="2" scope="col">Notas 
                </th>
                <th rowspan="2" scope="col">Média</th>
            </tr>
            <tr>
                 <th scope="colgroup">Nota 1</th>
                <th scope="colgroup">Nota 2</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th rowspan="4" scope="rowgroup">Exatas</th>
                <td>Matemática</td>
                <td>9,5</td>
                <td>8,9</td>
                <td>9,2</td>
            </tr>
            <tr>
                <td>Física</td>
                <td>8,0</td>
                <td>8,7</td>
                <td>8,3</td>
            </tr>
            <tr>
                <td>Química</td>
                <td>8,5</td>
                <td>7,8</td>
                <td>8,1</td>
            </tr>
            <tr>
                <td>Biologia</td>
                <td>9,0</td>
                <td>7,9</td>
                <td>8,4</td>
            </tr>
            <tr>
                <th colspan="4"
                scope="row">Média de Exatas</th>
                <td>8,5</td>
            </tr>
            <tr>
                <th rowspan="2" scope="rowgroup">Humanas</th>
                <td>História</td>
                <td>8,0</td>
                <td>8,5</td>
                <td>8,2</td>
            </tr>
            <tr>
                <td>Geografia</td>
                <td>7,0</td>
                <td>7,5</td>
                <td>7,2</td>
            </tr>
            <tr>
                <th colspan="4"
                scope="row">Média de Humanas</th>
                <td>7,7</td>
            </tr>
        </tbody>
    </table>
</body>
</html>

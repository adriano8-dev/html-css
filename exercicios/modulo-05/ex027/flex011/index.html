<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        div.conteiner {
            background-color: lightsalmon;

            display: flex;
            flex-flow: row nowrap;
        }

        div.item {
            background-color: lightskyblue;
            border: 1px solid black;
            text-align: center;
            flex-basis: 200px;
        }

        #cxA {
            flex-basis: 150px;
            flex-grow: 0;
            flex-shrink: 1;
        }

        #cxB {
            flex-basis: 150px;
            flex-grow: 2;
            flex-shrink: 1;
        }

        #cxC {
            flex-basis: 150px;
            flex-grow: 4;
            flex-shrink: 8;
        }
    </style>
</head>
<body>
    <div class="conteiner">
        <div class="item" id="cxA">0</div>
        <div class="item" id="cxB">1</div>
        <div class="item" id="cxC">0</div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        div.conteiner {
            background-color: lightsalmon;

            display: flex;
            flex-flow: row nowrap;
        }

        div.item {
            background-color: lightskyblue;
            border: 1px solid black;
            text-align: center;
        }

        #cxA {
            flex: 0 1 200px;
        }

        #cxB {
           flex: 2 0 150px;
        }

        #cxC {
           flex: 1 2 auto;
        }
    </style>
</head>
<body>
    <div class="conteiner">
        <div class="item" id="cxA">0</div>
        <div class="item" id="cxB">1</div>
        <div class="item" id="cxC">0</div>
    </div>
</body>
</html>
